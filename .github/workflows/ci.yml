name: Quality Checks

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'config/channels/**'
      - 'data/config.github.json'
      - 'docs/assets/**'
      - 'supabase/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install development dependencies
        run: uv sync --extra dev --locked

      - name: Check code quality
        run: uv run ruff check src tests scripts

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=60
