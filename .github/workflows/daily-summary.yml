name: Daily Xinxianxing Draft

on:
  schedule:
    # 00:17 UTC = 08:17 Asia/Shanghai. Avoid the top-of-hour Actions rush.
    - cron: "17 0 * * *"
  workflow_dispatch:

concurrency:
  group: daily-xinxianxing-draft
  cancel-in-progress: false

jobs:
  daily-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system fonts for share image
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: uv sync

      - name: Validate required secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          XINXIANXING_WEBHOOK_URL: ${{ secrets.XINXIANXING_WEBHOOK_URL }}
          XINXIANXING_PAID_FEISHU_URL: ${{ secrets.XINXIANXING_PAID_FEISHU_URL }}
          XINXIANXING_TUTORIAL_FEISHU_URL: ${{ secrets.XINXIANXING_TUTORIAL_FEISHU_URL }}
          XINXIANXING_MONEY_CASE_FEISHU_URL: ${{ secrets.XINXIANXING_MONEY_CASE_FEISHU_URL }}
          XINXIANXING_PRODUCTIVITY_TIP_FEISHU_URL: ${{ secrets.XINXIANXING_PRODUCTIVITY_TIP_FEISHU_URL }}
        run: |
          missing=0
          for name in DEEPSEEK_API_KEY APIFY_TOKEN XINXIANXING_WEBHOOK_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          if [ -z "${XINXIANXING_PAID_FEISHU_URL}" ]; then
            echo "::warning::XINXIANXING_PAID_FEISHU_URL is not set; paid Feishu delivery will be skipped."
          fi
          for name in XINXIANXING_TUTORIAL_FEISHU_URL XINXIANXING_MONEY_CASE_FEISHU_URL XINXIANXING_PRODUCTIVITY_TIP_FEISHU_URL; do
            if [ -z "${!name}" ]; then
              echo "::notice::${name} is not set; that category Feishu delivery will be skipped."
            fi
          done

          exit "$missing"

      - name: Prepare GitHub Actions config
        run: |
          cp data/config.github.json data/config.json
          python - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("data/config.json").read_text(encoding="utf-8"))
          if config.get("publishing", {}).get("auto_publish") is not False:
              raise SystemExit("publishing.auto_publish must stay false in GitHub Actions")
          PY

      - name: Run Xinxianxing pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          XINXIANXING_WEBHOOK_URL: ${{ secrets.XINXIANXING_WEBHOOK_URL }}
          XINXIANXING_PAID_FEISHU_URL: ${{ secrets.XINXIANXING_PAID_FEISHU_URL }}
          XINXIANXING_TUTORIAL_FEISHU_URL: ${{ secrets.XINXIANXING_TUTORIAL_FEISHU_URL }}
          XINXIANXING_MONEY_CASE_FEISHU_URL: ${{ secrets.XINXIANXING_MONEY_CASE_FEISHU_URL }}
          XINXIANXING_PRODUCTIVITY_TIP_FEISHU_URL: ${{ secrets.XINXIANXING_PRODUCTIVITY_TIP_FEISHU_URL }}
        run: uv run xinxianxing --hours 24

      - name: Ensure published posts were not changed
        run: |
          if ! git diff --quiet -- docs/_posts; then
            git diff -- docs/_posts
            echo "::error::docs/_posts changed during the automated draft run. Publish posts manually only."
            exit 1
          fi

      - name: Set current date
        run: echo "DATE=$(date -u +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Commit generated drafts and share image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data/drafts docs/_drafts docs/drafts data/share_images
          git add data/drafts/ docs/_drafts/ docs/drafts/ data/share_images/

          if git diff --cached --quiet; then
            echo "No generated draft or share image changes to commit."
            exit 0
          fi

          git commit -m "chore: daily 信先行 draft ${DATE}"
          git push
