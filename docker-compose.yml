services:
  xinxianxing:
    build: .
    container_name: xinxianxing
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    # Run daily at 8:00 AM UTC (adjust as needed)
    # For one-time run, use: docker compose run --rm xinxianxing
    command: ["--hours", "24"]
