theme: jekyll-theme-cayman
title: 信先行
description: AI教程、赚钱案例与效率技巧行动卡片
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://xinxianxing.com" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
